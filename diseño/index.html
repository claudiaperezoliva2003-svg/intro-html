<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <title>Fitbit</title>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">
            G
        </div>

        <nav>
            <a href="#">Phones</a>
            <a href="#">Earbuds</a>
            <a href="#">Watches</a>
            <a href="#">Smart Home</a>
            <a href="#">Accessories</a>
            <a href="#">Subscriptions</a>
        </nav>

    </header>

    <!-- CONTENIDO -->
    <main class="contenedor">

        <!-- IZQUIERDA -->
        <section class="producto">

            <div class="imagen-producto">

                <img src="fitbit.png" alt="Fitbit">

            </div>

        </section>

        <!-- DERECHA -->
        <aside class="info">

            <h1>Fitbit Inspire 3</h1>

            <p class="subtitulo">Health & Fitness Tracker</p>

            <p class="precio">99,95 €</p>

            <hr>

            <p class="texto-color">Choose a color</p>

            <div class="colores">

                <div class="color">
                    <img src="fitbit-negro.png" alt="">
                    <p>Midnight Zen</p>
                </div>

                <div class="color">
                    <img src="fitbit-rosa.png" alt="">
                    <p>Lilac Bliss</p>
                </div>

                <div class="color">
                    <img src="fitbit-amarillo.png" alt="">
                    <p>Morning Glow</p>
                </div>

            </div>

            <div class="compra">

                <p class="precio grande">99,95 €</p>

                <hr>

                <button>Añadir al carrito</button>

            </div>

        </aside>

    </main>
